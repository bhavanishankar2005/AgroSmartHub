<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AgroSmart Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e5128 0%, #2d6a4f 25%, #40916c 50%, #52b788 75%, #74c69d 100%);
            background-attachment: fixed;
            background-size: 400% 400%;
            animation: agriGradient 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(100, 200, 100, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(76, 175, 80, 0.1) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        @keyframes agriGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-left: 5px solid #52b788;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .logout-btn {
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #b71c1c;
            transform: translateY(-2px);
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            padding: 12px 24px;
            border: 2px solid #40916c;
            background: white;
            color: #2d6a4f;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #40916c 0%, #52b788 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(64, 145, 108, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(64, 145, 108, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: 0.3s;
            border-top: 4px solid #52b788;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(82, 183, 136, 0.1) 0%, transparent 100%);
            z-index: 0;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #2d6a4f;
            margin: 10px 0;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            color: #555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .table-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow-x: auto;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
            border-bottom: 2px solid #52b788;
        }

        table th {
            padding: 15px;
            text-align: left;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #e8f5e9;
            color: #333;
        }

        table tbody tr:hover {
            background: #f1f8f6;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-placed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-processing {
            background: #fff3e0;
            color: #e65100;
        }

        .status-shipped {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .status-delivered {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: capitalize;
        }

        .role-farmer {
            background: #a5d6a7;
            color: #1b5e20;
        }

        .role-buyer {
            background: #81c784;
            color: #1b5e20;
        }

        .role-admin {
            background: #66bb6a;
            color: #fff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        .error {
            background: #ffebee;
            color: #d32f2f;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #d32f2f;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #2e7d32;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .nav-tabs {
                flex-wrap: wrap;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 14px;
            }

            table th,
            table td {
                padding: 10px;
            }
        }

        .product-card-admin {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ff9800;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .product-card-admin:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .product-card-admin.approved {
            border-left-color: #66bb6a;
            background: #f1f8f6;
        }

        .product-card-admin.rejected {
            border-left-color: #ef5350;
            background: #ffebee;
        }

        .product-header {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .product-thumb {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .product-details {
            flex: 1;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .product-meta {
            font-size: 14px;
            color: #666;
            margin: 5px 0;
        }

        .farmer-name {
            color: #667eea;
            font-weight: bold;
        }

        .approval-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-approve {
            padding: 8px 16px;
            background: linear-gradient(135deg, #66bb6a 0%, #52b788 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 3px 10px rgba(102, 187, 106, 0.3);
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 187, 106, 0.4);
        }

        .btn-reject {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ef5350 0%, #e53935 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 3px 10px rgba(239, 83, 80, 0.3);
        }

        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 83, 80, 0.4);
        }

        .approval-comment-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .approval-status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .status-pending {
            background: #ffb74d;
            color: white;
        }

        .status-approved {
            background: #66bb6a;
            color: white;
        }

        .status-rejected {
            background: #ef5350;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" onclick="showSection('dashboard')">📊 Dashboard</button>
            <button class="nav-btn" onclick="showSection('users')">👥 Users</button>
            <button class="nav-btn" onclick="showSection('orders')">📦 Orders</button>
            <button class="nav-btn" onclick="showSection('products')">🏪 Product Approvals</button>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dashboard" class="content-section active">
            <div class="stats-grid" id="statsGrid">
                <div class="loading">Loading statistics...</div>
            </div>
        </div>

        <!-- USERS SECTION -->
        <div id="users" class="content-section">
            <div class="table-container">
                <div id="usersContent">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </div>

        <!-- ORDERS SECTION -->
        <div id="orders" class="content-section">
            <div class="table-container">
                <div id="ordersContent">
                    <div class="loading">Loading orders...</div>
                </div>
            </div>
        </div>

        <!-- PRODUCT APPROVALS SECTION -->
        <div id="products" class="content-section">
            <div class="table-container">
                <div id="productsContent">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://agrosmarthub.loca.lt';

        function getAdminToken() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                location.href = 'login.html';
                return null;
            }
            return token;
        }

        function showSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            
            // Remove active class from nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected section
            document.getElementById(sectionId).classList.add('active');
            
            // Add active class to clicked button
            event.target.classList.add('active');

            // Load content
            if (sectionId === 'dashboard') {
                loadDashboard();
            } else if (sectionId === 'users') {
                loadUsers();
            } else if (sectionId === 'orders') {
                loadOrders();
            } else if (sectionId === 'products') {
                loadProducts();
            }
        }

        function loadProducts() {
            const token = getAdminToken();
            if (!token) return;

            const productsContent = document.getElementById('productsContent');
            productsContent.innerHTML = '<div class="loading">Loading products...</div>';

            fetch(`${API_URL}/admin/products/all`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.products) {
                    const products = data.products;
                    if (products.length === 0) {
                        productsContent.innerHTML = '<div class="loading">No products found</div>';
                        return;
                    }

                    let html = '';
                    products.forEach(product => {
                        const imageUrl = product.image_filename ? `${API_URL}/uploads/${product.image_filename}` : 'https://via.placeholder.com/80?text=No+Image';
                        const statusBadge = `<span class="approval-status-badge status-${product.approval_status}">${product.approval_status || 'pending'}</span>`;
                        const cardClass = `product-card-admin ${product.approval_status || 'pending'}`;
                        
                        let actionHtml = '';
                        if (product.approval_status === 'pending') {
                            actionHtml = `
                                <div class="approval-actions">
                                    <button class="btn-approve" onclick="approveProduct(${product.product_id}, this)">✓ Approve</button>
                                    <button class="btn-reject" onclick="rejectProduct(${product.product_id}, this)">✗ Reject</button>
                                </div>
                                <textarea class="approval-comment-input" placeholder="Add comment (optional)" id="comment-${product.product_id}"></textarea>
                            `;
                        } else if (product.approval_status === 'approved' || product.approval_status === 'rejected') {
                            actionHtml = `<div class="product-meta"><strong>Admin Comment:</strong> ${product.approval_comment || 'No comment'}</div>`;
                        }

                        html += `
                            <div class="${cardClass}">
                                <div class="product-header">
                                    <img src="${imageUrl}" alt="${product.productname}" class="product-thumb" onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                                    <div class="product-details">
                                        <div class="product-title">${product.productname} ${statusBadge}</div>
                                        <div class="product-meta"><strong>Farmer:</strong> <span class="farmer-name">${product.username}</span></div>
                                        <div class="product-meta"><strong>Description:</strong> ${product.productdescription}</div>
                                        <div class="product-meta"><strong>Price:</strong> ₹${parseFloat(product.price).toFixed(2)}</div>
                                        <div class="product-meta"><strong>Quantity:</strong> ${product.quantity}</div>
                                        ${actionHtml}
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    productsContent.innerHTML = html;
                } else {
                    productsContent.innerHTML = '<div class="error">Failed to load products</div>';
                }
            })
            .catch(e => {
                productsContent.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            });
        }

        function approveProduct(productId, btn) {
            const token = getAdminToken();
            if (!token) return;

            const comment = document.getElementById(`comment-${productId}`).value;
            const parentDiv = btn.closest('.product-card-admin');

            fetch(`${API_URL}/admin/products/${productId}/approve`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ comment })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    parentDiv.classList.remove('pending');
                    parentDiv.classList.add('approved');
                    loadProducts();
                    alert('Product approved successfully!');
                } else {
                    alert('Failed to approve: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(e => alert('Error: ' + e.message));
        }

        function rejectProduct(productId, btn) {
            const token = getAdminToken();
            if (!token) return;

            const comment = document.getElementById(`comment-${productId}`).value || 'Rejected by admin';
            const parentDiv = btn.closest('.product-card-admin');

            if (!confirm('Are you sure you want to reject this product?')) return;

            fetch(`${API_URL}/admin/products/${productId}/reject`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ comment })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    parentDiv.classList.remove('pending');
                    parentDiv.classList.add('rejected');
                    loadProducts();
                    alert('Product rejected!');
                } else {
                    alert('Failed to reject: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(e => alert('Error: ' + e.message));
        }

        function loadDashboard() {
            const token = getAdminToken();
            if (!token) return;

            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '<div class="loading">Loading statistics...</div>';

            fetch(`${API_URL}/admin/dashboard`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.stats) {
                    const stats = data.stats;
                    statsGrid.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-label">👥 Total Users</div>
                            <div class="stat-value">${stats.total_users}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">🚜 Total Farmers</div>
                            <div class="stat-value">${stats.total_farmers}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">🛒 Total Buyers</div>
                            <div class="stat-value">${stats.total_buyers}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">🏪 Total Products</div>
                            <div class="stat-value">${stats.total_products}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">📦 Total Orders</div>
                            <div class="stat-value">${stats.total_orders}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">💰 Total Sales</div>
                            <div class="stat-value">₹${stats.total_sales.toFixed(2)}</div>
                        </div>
                    `;
                } else {
                    statsGrid.innerHTML = '<div class="error">Failed to load statistics</div>';
                }
            })
            .catch(e => {
                statsGrid.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            });
        }

        function loadUsers() {
            const token = getAdminToken();
            if (!token) return;

            const usersContent = document.getElementById('usersContent');
            usersContent.innerHTML = '<div class="loading">Loading users...</div>';

            fetch(`${API_URL}/admin/users`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.users) {
                    const users = data.users;
                    if (users.length === 0) {
                        usersContent.innerHTML = '<div class="loading">No users found</div>';
                        return;
                    }

                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Phone</th>
                                    <th>Role</th>
                                    <th>Created At</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    users.forEach(user => {
                        const date = new Date(user.created_at).toLocaleDateString();
                        const roleClass = `role-${user.role}`;
                        html += `
                            <tr>
                                <td>${user.id}</td>
                                <td><strong>${user.username}</strong></td>
                                <td>${user.phonenumber || 'N/A'}</td>
                                <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                                <td>${date}</td>
                            </tr>
                        `;
                    });

                    html += `</tbody></table>`;
                    usersContent.innerHTML = html;
                } else {
                    usersContent.innerHTML = '<div class="error">Failed to load users</div>';
                }
            })
            .catch(e => {
                usersContent.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            });
        }

        function loadOrders() {
            const token = getAdminToken();
            if (!token) return;

            const ordersContent = document.getElementById('ordersContent');
            ordersContent.innerHTML = '<div class="loading">Loading orders...</div>';

            fetch(`${API_URL}/admin/orders`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.orders) {
                    const orders = data.orders;
                    if (orders.length === 0) {
                        ordersContent.innerHTML = '<div class="loading">No orders found</div>';
                        return;
                    }

                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>User</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    orders.forEach(order => {
                        const date = new Date(order.created_at).toLocaleDateString();
                        const statusClass = `status-${order.status}`;
                        html += `
                            <tr>
                                <td><strong>#${order.order_id}</strong></td>
                                <td>${order.username}</td>
                                <td>₹${parseFloat(order.total).toFixed(2)}</td>
                                <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                                <td>${date}</td>
                            </tr>
                        `;
                    });

                    html += `</tbody></table>`;
                    ordersContent.innerHTML = html;
                } else {
                    ordersContent.innerHTML = '<div class="error">Failed to load orders</div>';
                }
            })
            .catch(e => {
                ordersContent.innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            });
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('role');
            location.href = 'login.html';
        }

        // Load dashboard on page load
        window.addEventListener('load', loadDashboard);
    </script>
</body>
